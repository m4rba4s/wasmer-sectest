name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  native:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Full corpus
        run: cargo run --locked --release -- --profile all --summary-only --no-color

      - name: Campaign
        run: cargo run --locked --release -- --campaign --summary-only --no-color

      - name: Singlepass backend
        run: cargo run --locked --release -- --profile all --backend singlepass --summary-only --no-color

      - name: Process supervisor
        run: cargo run --locked --release -- --case non_cooperative_loop --isolate process --timeout-ms 100 --no-color

      - name: Explicit policy
        run: cargo run --locked --release -- --policy policy.example.toml --profile all --summary-only --no-color

      - name: External corpus
        run: cargo run --locked --release -- --corpus examples/external-corpus --no-color

      - name: Evidence reports
        run: |
          cargo run --locked --release -- --profile interview --format markdown --report target/interview-report.md
          cargo run --locked --release -- --profile campaign --format markdown --report target/adversary-campaign.md
          cargo run --locked --release -- --profile all --format sarif --report target/wasmer-harness.sarif

  linux-distro:
    name: distro-${{ matrix.distro_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro_name: debian
            image: debian:stable-slim
            install: >-
              apt-get update &&
              apt-get install -y --no-install-recommends
              bash
              build-essential
              ca-certificates
              curl
              git
              pkg-config
              xz-utils
          - distro_name: arch
            image: archlinux:base
            install: >-
              pacman -Sy --noconfirm
              bash
              base-devel
              ca-certificates
              curl
              git
              pkgconf
              xz
    container: ${{ matrix.image }}
    steps:
      - name: Install distro prerequisites
        run: ${{ matrix.install }}

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Full corpus
        run: cargo run --locked --release -- --profile all --summary-only --no-color

      - name: Process supervisor
        run: cargo run --locked --release -- --case non_cooperative_loop --isolate process --timeout-ms 100 --no-color

      - name: External corpus
        run: cargo run --locked --release -- --corpus examples/external-corpus --no-color

      - name: Evidence reports
        run: |
          cargo run --locked --release -- --profile interview --format markdown --report target/interview-report.md
          cargo run --locked --release -- --profile all --format sarif --report target/wasmer-harness.sarif
